<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar PsikoChizz</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome untuk ikon Google (jika diperlukan) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
   <div class="wrapper">
     <form action="#" class="register" id="registerForm">
      <h2>Daftar</h2>
      
      <!-- Added id="username" from the image -->
      <div class="input-field field">
        <input type="text" required id="username">
        <label>Masukkan nama pengguna</label>
      </div>
          <!-- Added id="username" from the image -->
      <div class="input-field field">
        <input type="text" required id="email">
        <label>Email</label>
      </div>
        
      <!-- Added id="password" from the image -->
      <div class="input-field field">
        <input type="password" required id="password">
        <label>Masukkan kata sandi</label>
      </div>
      
      <!-- Tempat menampilkan pesan error/sukses dari JavaScript -->
      <p id="message"></p>
      
      <button type="submit">Daftar</button>
      
      <div class="social">
        <div class="go">
          <a href="index.html">Masuk</a>
        </div>
        <div class="kanan">
          <i class="fab fa-google"></i> dengan Google
        </div>
      </div>
    </form>
  </div>

  <!-- Box Alert tambahan (jika skrip JS Anda membutuhkannya) -->
  <div id="alertBox" class="alert" style="display:none;"></div>

<p id="message"></p>
<script src="js/register.js" defer></script>
</body>
</html>
