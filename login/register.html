<body>
  <div class="wrapper">
    <form action="#"class="register"id="registerForm">
      <h2>Register</h2>
        <div class="input-field">
        <input type="text" required>
        <label>Email</label>
      </div>
      <div class="input-field">
        <input type="password" required>
        <label>Masukkan kata sandi</label>
      </div>
      <div class="forget">
        <label for="remember">
          <input type="checkbox" id="remember">
          <p>Ingat aku</p>
        </label>
        <a href="#">Lupa kata sandi?</a>
      </div>
      <button type="submit">Masuk</button>
      <div class="login">
        <p>Sudah punya akun? <a href="#">Masuk</a></p>
      </div>
      <p id="massage"></p>

      <button type="submit">Daftar</button>

      <div class="social">
        <div class="go">
          <a href="index.html">Login</a>
        </div 
      </form>
    
  </div>
<p id="massage"></p>
